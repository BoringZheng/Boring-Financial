version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-boring_financial}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '${POSTGRES_PORT_BIND:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '${REDIS_PORT_BIND:-6379}:6379'

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-boring_financial}
      REDIS_URL: redis://redis:6379/0
      CLASSIFICATION_PROVIDER: ${CLASSIFICATION_PROVIDER:-composite}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LOCAL_MODEL_API_BASE: ${LOCAL_MODEL_API_BASE:-http://model-service:8001/v1}
      LOCAL_MODEL_API_KEY: ${LOCAL_MODEL_API_KEY:-EMPTY}
      LOCAL_MODEL_NAME: ${LOCAL_MODEL_NAME:-mock-qwen}
      TASK_ALWAYS_EAGER: '${TASK_ALWAYS_EAGER:-true}'
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost,http://nginx}
    depends_on:
      - postgres
      - redis
      - model-service
    volumes:
      - backend-storage:/app/storage
    ports:
      - '${BACKEND_PORT_BIND:-8000}:8000'

  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: celery -A backend.core.celery_app.celery_app worker -l info
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-boring_financial}
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LOCAL_MODEL_API_BASE: ${LOCAL_MODEL_API_BASE:-http://model-service:8001/v1}
      LOCAL_MODEL_API_KEY: ${LOCAL_MODEL_API_KEY:-EMPTY}
      LOCAL_MODEL_NAME: ${LOCAL_MODEL_NAME:-mock-qwen}
      TASK_ALWAYS_EAGER: '${TASK_ALWAYS_EAGER:-false}'
    depends_on:
      - postgres
      - redis
      - model-service
    volumes:
      - backend-storage:/app/storage

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT_BIND:-4173}:80'

  model-service:
    build:
      context: .
      dockerfile: model-service/Dockerfile
    restart: unless-stopped
    ports:
      - '${MODEL_SERVICE_PORT_BIND:-8001}:8001'

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - '${NGINX_HTTP_PORT:-80}:80'

volumes:
  postgres-data:
  backend-storage:
